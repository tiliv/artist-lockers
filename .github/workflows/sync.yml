name: Bot Sync

on:
  workflow_dispatch:
    inputs:
      ipfs_budget:
        description: 'IPFS upload budget in seconds'
        default: '300'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ARTIFACTS_DIR: ${{ github.workspace }}/_data
        run: uv run bin/cli.py sync

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet _data/ || \
          (git add _data/ && git commit -m "bot: sync $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" && git push)

  distribute:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}  # pick up sync commit if it pushed

      - uses: astral-sh/setup-uv@v5

      - name: Distribute to IPFS
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ARTIFACTS_DIR: ${{ github.workspace }}/_data
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: bin/pin ${{ inputs.ipfs_budget || '300' }}

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet _data/ || \
          (git add _data/ && git commit -m "bot: ipfs $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
